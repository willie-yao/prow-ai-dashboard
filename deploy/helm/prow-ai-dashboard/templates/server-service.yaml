apiVersion: v1
kind: Service
metadata:
  name: {{ include "prow-ai-dashboard.fullname" . }}-server
  labels:
    {{- include "prow-ai-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.server.service.type }}
  selector:
    {{- include "prow-ai-dashboard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: {{ .Values.server.service.port }}
      targetPort: http

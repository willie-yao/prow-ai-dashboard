name: Reusable Deploy

# Reusable workflow that builds and deploys a Prow AI Dashboard for a single
# project. Consumer repos call this from a workflow in their own repo and
# point at the directory in their checkout that holds project.yaml plus
# prompts/system.md. The engine repo is checked out separately for the Go
# and frontend code.
#
# Example consumer workflow:
#   jobs:
#     deploy:
#       uses: willie-yao/prow-ai-dashboard/.github/workflows/reusable-deploy.yml@main
#       with:
#         project_dir: .
#         # Optional: keep private or preview model identifiers and private
#         # endpoint URLs out of the public project.yaml by sourcing them
#         # from repo variables (`gh variable set AI_MODEL ...`) instead.
#         # The project.yaml `ai.model` / `ai.endpoint` fields still win
#         # if set.
#         ai-model: ${{ vars.AI_MODEL }}
#         ai-endpoint: ${{ vars.AI_ENDPOINT }}
#       secrets:
#         AI_TOKEN: ${{ secrets.AI_TOKEN }}
#         SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
#         ISSUE_TOKEN: ${{ secrets.ISSUE_TOKEN }}
#         SKILL_TOKEN: ${{ secrets.SKILL_TOKEN }}

on:
  workflow_call:
    inputs:
      project_dir:
        description: "Directory in the caller repo containing project.yaml and prompts/system.md. Defaults to the repo root."
        required: false
        type: string
        default: "."
      builds:
        description: "Number of recent builds to fetch per job."
        required: false
        type: number
        default: 8
      workers:
        description: "Number of parallel workers in the fetcher."
        required: false
        type: number
        default: 5
      fetch-timeout:
        description: "Fetcher timeout (e.g. 30m)."
        required: false
        type: string
        default: 30m
      ai:
        description: "Whether to run AI analysis on failures."
        required: false
        type: boolean
        default: true
      ai-model:
        description: "Optional. AI model identifier passed to the fetcher as AI_MODEL. Use this with a repo variable (vars.AI_MODEL) to keep private or preview model labels out of the public project.yaml. The yaml ai.model field wins if set."
        required: false
        type: string
        default: ""
      ai-endpoint:
        description: "Optional. AI chat-completions URL passed to the fetcher as AI_ENDPOINT. Use this with a repo variable (vars.AI_ENDPOINT) to keep private endpoint URLs out of the public project.yaml. The yaml ai.endpoint field wins if set."
        required: false
        type: string
        default: ""
      include-presubmits:
        description: "Include presubmit jobs in addition to periodics. ORed with project.yaml source.include_presubmits — setting either to true enables presubmits."
        required: false
        type: boolean
        default: false
      skip-fetch:
        description: "Skip the data fetcher and publish pre-fetched data from <project_dir>/data/ in the consumer repo. Useful when the AI endpoint is unreachable from GitHub-hosted runners (e.g. a private cluster service) — run the fetcher locally, commit data/, set this true."
        required: false
        type: boolean
        default: false
      runs-on:
        description: "Runner label for the deploy job. Accepts a single label (e.g. 'ubuntu-latest') or a JSON-encoded array (e.g. '[\"self-hosted\", \"qwen-cluster\"]') for multi-label self-hosted runners with cluster-internal connectivity."
        required: false
        type: string
        default: ubuntu-latest
    secrets:
      AI_TOKEN:
        description: "Token used to call the chat completions endpoint."
        required: false
      SLACK_WEBHOOK_URL:
        description: "Slack webhook for failure notifications."
        required: false
      ISSUE_TOKEN:
        description: "GitHub token (PAT or App token) with issues:write on the target repo, for auto-filing issues when issues.enabled is set. Optional; omit to disable."
        required: false
      SKILL_TOKEN:
        description: "GitHub token (PAT or App token) with contents:write + pull-requests:write on the dashboard repo, for opening skill-suggestion PRs when ai.suggest_skills.enabled is set. Optional; omit to disable."
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ${{ startsWith(inputs.runs-on, '[') && fromJSON(inputs.runs-on) || inputs.runs-on }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          path: consumer

      - name: Checkout engine repo
        uses: actions/checkout@v4
        with:
          repository: willie-yao/prow-ai-dashboard
          # Build the engine code from the exact commit of the reusable workflow
          # the consumer pinned (uses:@<ref>), so the pinned ref controls both
          # the pipeline and the code with no separate engine-ref knob.
          ref: ${{ github.job_workflow_sha }}
          fetch-tags: true
          path: engine

      - name: Resolve project paths and base path
        id: cfg
        run: |
          CONFIG_PATH="$GITHUB_WORKSPACE/consumer/${{ inputs.project_dir }}/project.yaml"
          if [ ! -f "$CONFIG_PATH" ]; then
            echo "::error::project.yaml not found at $CONFIG_PATH"
            exit 1
          fi
          # Extract branding.base_path. Strip surrounding quotes.
          BASE_PATH="$(awk '
            $1 == "branding:" { in_b=1; next }
            in_b && $1 == "base_path:" {
              sub(/^[ \t]*base_path:[ \t]*/, "", $0)
              gsub(/^["'"'"']|["'"'"']$/, "", $0)
              print $0
              exit
            }
          ' "$CONFIG_PATH")"
          if [ -z "$BASE_PATH" ]; then
            echo "::error::branding.base_path missing in $CONFIG_PATH"
            exit 1
          fi
          # Ensure trailing slash for vite base.
          case "$BASE_PATH" in
            */) ;;
            *) BASE_PATH="${BASE_PATH}/";;
          esac
          echo "base_path=$BASE_PATH" >> "$GITHUB_OUTPUT"
          PROJECT_DIR_ABS="$GITHUB_WORKSPACE/consumer/${{ inputs.project_dir }}"
          echo "project_dir_abs=$PROJECT_DIR_ABS" >> "$GITHUB_OUTPUT"
          # Stable slug used for cache keys (replace slashes/dots with dashes).
          SLUG="$(echo "${{ inputs.project_dir }}" | tr '/.' '--' | sed 's/^-*//; s/-*$//')"
          [ -z "$SLUG" ] && SLUG="root"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "Resolved project_dir=$PROJECT_DIR_ABS base_path=$BASE_PATH slug=$SLUG"

      # --- Go data fetcher (skipped when skip-fetch=true) ---
      - uses: actions/setup-go@v5
        if: ${{ !inputs.skip-fetch }}
        with:
          go-version-file: engine/backend/go.mod
          cache-dependency-path: engine/backend/go.sum

      - name: Build data fetcher
        if: ${{ !inputs.skip-fetch }}
        working-directory: engine/backend
        run: |
          # Embed the engine version. Pick the full MAJOR.MINOR.PATCH tag at the
          # built commit (ignore the moving vMAJOR alias, which would understate
          # the version), else dev-<sha> for branch or @main builds (which the
          # version check then skips).
          VERSION="$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
          [ -z "$VERSION" ] && VERSION="dev-$(git rev-parse --short HEAD)"
          echo "Building fetcher version $VERSION"
          go build -ldflags "-X main.version=$VERSION" -o "$GITHUB_WORKSPACE/fetcher" ./cmd/fetcher/

      # Restore cached data (job JSON + AI cache) so we only fetch new builds.
      - name: Restore data cache
        if: ${{ !inputs.skip-fetch }}
        uses: actions/cache/restore@v4
        with:
          path: engine/frontend/public/data
          key: data-cache-${{ steps.cfg.outputs.slug }}-${{ github.run_id }}
          restore-keys: data-cache-${{ steps.cfg.outputs.slug }}-

      - name: Fetch test data
        if: ${{ !inputs.skip-fetch }}
        env:
          AI_TOKEN: ${{ secrets.AI_TOKEN }}
          AI_MODEL: ${{ inputs.ai-model }}
          AI_ENDPOINT: ${{ inputs.ai-endpoint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ISSUE_TOKEN: ${{ secrets.ISSUE_TOKEN }}
          SKILL_TOKEN: ${{ secrets.SKILL_TOKEN }}
        run: |
          AI_FLAG=""
          if [ "${{ inputs.ai }}" = "true" ]; then
            AI_FLAG="-ai"
          fi
          PRESUBMITS_FLAG=""
          if [ "${{ inputs.include-presubmits }}" = "true" ]; then
            PRESUBMITS_FLAG="-include-presubmits"
          fi
          "$GITHUB_WORKSPACE/fetcher" \
            -project-dir="${{ steps.cfg.outputs.project_dir_abs }}" \
            -builds=${{ inputs.builds }} \
            -workers=${{ inputs.workers }} \
            -out="$GITHUB_WORKSPACE/engine/frontend/public/data" \
            -timeout=${{ inputs.fetch-timeout }} \
            $AI_FLAG \
            $PRESUBMITS_FLAG

      - name: Save data cache
        if: ${{ !inputs.skip-fetch && always() }}
        uses: actions/cache/save@v4
        with:
          path: engine/frontend/public/data
          key: data-cache-${{ steps.cfg.outputs.slug }}-${{ github.run_id }}

      # --- Pre-fetched data path (skip-fetch=true) ---
      - name: Copy pre-fetched data
        if: ${{ inputs.skip-fetch }}
        run: |
          DATA_SRC="${{ steps.cfg.outputs.project_dir_abs }}/data"
          if [ ! -d "$DATA_SRC" ]; then
            echo "::error::skip-fetch=true but no data/ directory found at $DATA_SRC. Run the fetcher locally and commit the output to <project_dir>/data/ in the consumer repo."
            exit 1
          fi
          mkdir -p "$GITHUB_WORKSPACE/engine/frontend/public/data"
          cp -r "$DATA_SRC/." "$GITHUB_WORKSPACE/engine/frontend/public/data/"
          echo "Copied pre-fetched data from $DATA_SRC"
          ls -la "$GITHUB_WORKSPACE/engine/frontend/public/data"

      # --- React frontend ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: engine/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: engine/frontend
        run: npm ci

      - name: Build frontend
        working-directory: engine/frontend
        env:
          VITE_BASE_PATH: ${{ steps.cfg.outputs.base_path }}
        run: npm run build

      # --- Deploy to GitHub Pages ---
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: engine/frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

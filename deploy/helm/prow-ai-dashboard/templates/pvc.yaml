{{- if and (not .Values.persistence.enabled) (not .Values.persistence.existingClaim) }}
{{- fail "persistence.enabled is false but persistence.existingClaim is unset: the fetcher and server both need a shared volume" }}
{{- end }}
{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "prow-ai-dashboard.pvcName" . }}
  labels:
    {{- include "prow-ai-dashboard.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
{{- end }}

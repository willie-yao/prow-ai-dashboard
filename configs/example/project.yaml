# Example project config for prow-ai-dashboard.
#
# This file documents every field a consumer repo can set. Copy it into your
# consumer repo as project.yaml, drop a prompts/system.md alongside it, and
# point .github/workflows/deploy.yml at the reusable workflow in this engine
# repo. See docs/onboarding-a-new-project.md and docs/writing-prompts.md for
# details.

# Stable identifier used in cache keys and log lines. Lowercase, no spaces.
id: example

# Full display name shown in the site header.
name: "Example Kubernetes Project"

# Optional short name for compact UIs.
short_name: "EXAMPLE"

# Where to discover prow job YAMLs in kubernetes/test-infra.
source:
  test_infra_path: "config/jobs/kubernetes-sigs/your-project"
  # Only files whose name starts with this prefix are treated as job
  # configs. Use the project's own prefix.
  file_prefix: "your-project-"

# Which testgrid dashboard's jobs to show. Filter is applied to each job's
# testgrid-dashboards annotation.
testgrid:
  dashboard: "sig-foo-your-project"

# GCS bucket holding build artifacts.
gcs:
  bucket: "kubernetes-ci-logs"

# UI-facing branding. Frontend reads these from data/manifest.json at
# runtime; backend uses site_url for notification deep links.
branding:
  title: "Example Project Dashboard"
  # GitHub Pages base path; must match your consumer repo name.
  base_path: "/your-consumer-repo"
  site_url: "https://your-org.github.io/your-consumer-repo"
  source_repo:
    owner: "kubernetes-sigs"
    name: "your-project"

# Per-build artifact collector. Pick one of:
#   - "capi": artifacts/clusters/{name}/machines/{vm}/... (CAPI providers)
#   - "generic": no project-specific layout; useful for k/k-style jobs
artifacts:
  collector: "capi"

# CAPI-specific knobs. Only used when artifacts.collector == "capi".
#
# Set cluster_name_prefix when your E2E suite names every workload cluster
# with a shared prefix (CAPZ uses "capz-e2e"). The CAPI collector matches
# JUnit test cases to clusters by looking for that prefix.
#
# Leave cluster_name_prefix as the empty string when your suite uses
# per-spec cluster names without a common prefix (CAPI core uses spec
# names like "quick-start-bxqxxs", "md-rollout-yhse4f"). The collector
# falls back to a generic substring matcher.
capi:
  cluster_name_prefix: "your-project-e2e"

# AI configuration. Composed at fetcher startup from:
#   1. engine's universal Prow base prompt
#   2. this repo's prompts/system.md (mandatory)
#   3. engine's JSON response schema footer
#
# The fetcher hard-errors at startup if prompts/system.md is missing or
# empty. See docs/writing-prompts.md.
#
# endpoint, model, and headers can target any OpenAI-compatible chat
# completions API. Defaults point at GitHub Copilot. See
# docs/ai-providers.md for Nvidia Dynamo / Azure OpenAI / OpenAI / Ollama
# snippets.
ai:
  module: "capi"
  endpoint: "https://api.githubcopilot.com/chat/completions"
  model: "claude-opus-4.6"

  # Per-failure evidence sent to the AI. The capi module gathers these
  # alongside the build log and stack trace before each call. Every field
  # is optional; omitting a field falls back to the engine default. To
  # explicitly disable a default, set the field to an empty list ([]).
  #
  # All fields apply to the capi module today. The generic module ignores
  # them but the schema is accepted so projects can switch modules without
  # editing this block.
  evidence:
    # Filenames under artifacts/clusters/<name>/machines/<vm>/ to fetch
    # the tail of and include as "=== Machine log: <name> ===" sections
    # in the prompt.
    #
    # Engine default: kubelet.log, containerd.log, journal.log.
    #
    # Add the logs your project actually publishes. For example, CAPZ
    # extends this with boot.log + cloud-init-output.log; CAPI core adds
    # kern.log (CAPD jobs collect it).
    # machine_logs:
    #   - kubelet.log
    #   - containerd.log
    #   - journal.log
    #   - boot.log
    #   - cloud-init-output.log

    # Management-cluster ("bootstrap" kind cluster) namespaces to walk
    # under artifacts/clusters/bootstrap/logs/. For each entry the
    # collector picks one manager.log per deployment in that namespace.
    # A single namespace can host multiple deployments (e.g. CAPZ's
    # capz-system runs both ASO and the CAPZ controller); each gets its
    # own "=== Controller log: <ns>/<deployment> ===" section.
    #
    # Engine default: capi-system, capi-kubeadm-bootstrap-system,
    # capi-kubeadm-control-plane-system.
    #
    # Each entry can be a bare namespace string or an object with custom
    # pod-name filter and container-log filename:
    # controller_logs:
    #   - capi-system                               # short form
    #   - namespace: your-project-system           # full form
    #     pod_name_regex: "your-controller-.*"    # default: ".*"
    #     container_log: "manager.log"            # default: "manager.log"

    # Regex patterns matched against each line of build-log.txt during
    # evidence collection. Matches plus 2 lines of context are inserted
    # as "=== Build Log Errors ===" in the prompt. The raw tail of the
    # build log is also included separately, so generic "error" patterns
    # are redundant here; reserve this list for high-signal,
    # provider-specific failures.
    #
    # Engine default: FAIL|\[FAIL\], timed?\s*out|timeout,
    # ImagePullBackOff|ErrImagePull, CrashLoopBackOff, NotFound|not found.
    # build_log_patterns:
    #   - "FAIL|\\[FAIL\\]"
    #   - "your-provider-specific-error"

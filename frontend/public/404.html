<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prow AI Dashboard</title>
    <!--
      SPA fallback for GitHub Pages. The dashboard is a single-page app served
      under a project base path (/<repo>/), so a direct deep link such as
      /<repo>/job/<job>/test/<test>?run=<id> has no matching file and Pages
      serves this 404.html. This script re-encodes the requested path into a
      query string and redirects to the base index.html, which decodes it back
      (see index.html) so the router can render the deep link. Standard
      rafgraph/spa-github-pages technique. pathSegmentsToKeep is 1 because the
      base path is a single segment; set it to 0 only for a root/custom-domain
      deploy.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>

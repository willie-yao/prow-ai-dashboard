{{- if and .Values.ai.enabled (not .Values.ai.existingSecret) }}
{{- if not .Values.ai.token }}
{{- fail "ai.token is required when ai.enabled and ai.existingSecret is unset" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "prow-ai-dashboard.aiSecret" . }}
  labels:
    {{- include "prow-ai-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.ai.tokenSecretKey }}: {{ .Values.ai.token | quote }}
{{- end }}

name: Reusable Deploy

# Reusable workflow that builds and deploys a Prow AI Dashboard for a single
# project. Consumer repos call this with a config name pointing at one of
# configs/<id>/project.yaml in the engine repo.
#
# Example consumer workflow:
#   jobs:
#     deploy:
#       uses: willie-yao/prow-ai-dashboard/.github/workflows/reusable-deploy.yml@main
#       with:
#         config: capz
#       secrets:
#         AI_TOKEN: ${{ secrets.AI_TOKEN }}
#         SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

on:
  workflow_call:
    inputs:
      config:
        description: "Project config name under configs/<id>/ in the engine repo."
        required: true
        type: string
      engine-ref:
        description: "Git ref of the engine repo to use. Defaults to main."
        required: false
        type: string
        default: main
      builds:
        description: "Number of recent builds to fetch per job."
        required: false
        type: number
        default: 8
      workers:
        description: "Number of parallel workers in the fetcher."
        required: false
        type: number
        default: 5
      fetch-timeout:
        description: "Fetcher timeout (e.g. 30m)."
        required: false
        type: string
        default: 30m
      ai:
        description: "Whether to run AI analysis on failures."
        required: false
        type: boolean
        default: true
    secrets:
      AI_TOKEN:
        description: "Token used to call the chat completions endpoint."
        required: false
      SLACK_WEBHOOK_URL:
        description: "Slack webhook for failure notifications."
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout engine repo
        uses: actions/checkout@v4
        with:
          repository: willie-yao/prow-ai-dashboard
          ref: ${{ inputs.engine-ref }}

      - name: Resolve base path from project config
        id: cfg
        run: |
          CONFIG_PATH="configs/${{ inputs.config }}/project.yaml"
          if [ ! -f "$CONFIG_PATH" ]; then
            echo "::error::config not found: $CONFIG_PATH"
            exit 1
          fi
          # Extract branding.base_path. Strip surrounding quotes.
          BASE_PATH="$(awk '
            $1 == "branding:" { in_b=1; next }
            in_b && $1 == "base_path:" {
              sub(/^[ \t]*base_path:[ \t]*/, "", $0)
              gsub(/^["'"'"']|["'"'"']$/, "", $0)
              print $0
              exit
            }
          ' "$CONFIG_PATH")"
          if [ -z "$BASE_PATH" ]; then
            echo "::error::branding.base_path missing in $CONFIG_PATH"
            exit 1
          fi
          # Ensure trailing slash for vite base.
          case "$BASE_PATH" in
            */) ;;
            *) BASE_PATH="${BASE_PATH}/";;
          esac
          echo "base_path=$BASE_PATH" >> "$GITHUB_OUTPUT"
          echo "Resolved base_path=$BASE_PATH"

      # --- Go data fetcher ---
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Build data fetcher
        working-directory: backend
        run: go build -o ../fetcher ./cmd/fetcher/

      # Restore cached data (job JSON + AI cache) so we only fetch new builds.
      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: frontend/public/data
          key: data-cache-${{ inputs.config }}-${{ github.run_id }}
          restore-keys: data-cache-${{ inputs.config }}-

      - name: Fetch test data
        env:
          AI_TOKEN: ${{ secrets.AI_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          AI_FLAG=""
          if [ "${{ inputs.ai }}" = "true" ]; then
            AI_FLAG="-ai"
          fi
          ./fetcher \
            -config="configs/${{ inputs.config }}/project.yaml" \
            -builds=${{ inputs.builds }} \
            -workers=${{ inputs.workers }} \
            -out=frontend/public/data \
            -timeout=${{ inputs.fetch-timeout }} \
            $AI_FLAG

      - name: Save data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: frontend/public/data
          key: data-cache-${{ inputs.config }}-${{ github.run_id }}

      # --- React frontend ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BASE_PATH: ${{ steps.cfg.outputs.base_path }}
        run: npm run build

      # --- Deploy to GitHub Pages ---
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
